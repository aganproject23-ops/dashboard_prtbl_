<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PRTBL — Sales Dashboard</title>
<style>
:root{
  --bg: #f6f1e7;
  --bg-2: #ffffff;
  --panel: #ffffff;
  --panel-2: #fdf8ee;
  --line: #e3d9c2;
  --paper: #2a2316;
  --paper-dim: #5c5340;
  --mute: #9b9078;
  --accent: #d9711a;
  --accent-2: #b8331f;
  --green: #4f7d3f;
  --font-display: 'Oswald', 'Arial Narrow', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 0%, rgba(217,113,26,0.07) 0%, transparent 45%),
    radial-gradient(circle at 90% 100%, rgba(184,51,31,0.05) 0%, transparent 45%);
  color: var(--paper);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  padding: 28px 24px 60px;
}
@font-face{font-family:'Oswald';src:local('Arial Narrow Bold');}

.wrap{ max-width: 1280px; margin: 0 auto; }

/* HEADER */
.tag-header{
  display:flex; align-items:flex-end; justify-content:space-between;
  border-bottom: 3px solid var(--paper);
  padding-bottom: 16px; margin-bottom: 22px;
  flex-wrap: wrap; gap: 14px;
}
.tag-left{ display:flex; align-items:center; gap:14px; }
.badge{
  width:46px; height:46px; border:2.5px solid var(--paper); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family: var(--font-display); font-weight:700; font-size:16px; letter-spacing:-0.5px;
  flex-shrink:0; background: var(--accent); color: #fff; border-color: var(--accent);
}
.tag-title{ font-family: var(--font-display); font-weight:700; font-size:30px; letter-spacing:1px; text-transform:uppercase; line-height:1;}
.tag-sub{ font-size:11.5px; letter-spacing:2.5px; text-transform:uppercase; color:var(--mute); margin-top:4px; font-family: var(--font-mono);}
.tag-meta{ text-align:right; font-family: var(--font-mono); font-size:11px; color:var(--mute); letter-spacing:0.5px; }
.tag-meta b{ color: var(--accent-2); }

/* FILTER BAR */
.filterbar{
  display:flex; gap:10px; align-items:center; margin-bottom:22px; flex-wrap:wrap;
  background: var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px 16px;
  box-shadow: 0 1px 3px rgba(42,35,22,0.06);
}
.filter-group{ display:flex; align-items:center; gap:8px; }
.filter-label{ font-family: var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1.5px; color:var(--mute); white-space:nowrap;}
select, input[type=date]{
  background: var(--panel-2); color: var(--paper); border:1px solid var(--line);
  border-radius:5px; padding:7px 10px; font-family: var(--font-body); font-size:13px;
  outline:none; cursor:pointer;
}
select:focus, input[type=date]:focus{ border-color: var(--accent); }
.search-box{
  background: var(--panel-2); color: var(--paper); border:1px solid var(--line);
  border-radius:5px; padding:7px 12px; font-size:13px; outline:none; min-width:220px;
  font-family: var(--font-body);
}
.search-box:focus{ border-color: var(--accent); }
.search-box::placeholder{ color: var(--mute); }
.btn-reset{
  background:transparent; border:1px solid var(--line); color:var(--paper-dim);
  padding:7px 14px; border-radius:5px; font-size:12px; cursor:pointer; font-family:var(--font-mono);
  letter-spacing:0.5px; transition: all .15s;
  margin-left:auto;
}
.btn-reset:hover{ border-color: var(--accent-2); color: var(--accent-2); }
.chip{
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(217,113,26,0.12); border:1px solid rgba(217,113,26,0.4);
  color: var(--accent-2); padding:5px 10px; border-radius:20px; font-size:11.5px;
  font-family: var(--font-mono);
}
.chip button{ background:none; border:none; color:var(--accent); cursor:pointer; font-size:13px; line-height:1; padding:0;}

/* KPI ROW */
.kpi-row{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:22px; }
.kpi-card{
  background: var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px 18px 16px;
  position:relative; overflow:hidden; box-shadow: 0 1px 3px rgba(42,35,22,0.06);
}
.kpi-card::before{
  content:''; position:absolute; top:0; left:0; width:3px; height:100%; background: var(--accent);
}
.kpi-card.alt::before{ background: var(--accent-2); }
.kpi-label{ font-family: var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1.5px; color:var(--mute); margin-bottom:8px; }
.kpi-value{ font-family: var(--font-display); font-weight:700; font-size:26px; letter-spacing:0.5px; }
.kpi-delta{ font-size:11.5px; margin-top:6px; font-family: var(--font-mono); }
.kpi-delta.up{ color: var(--green); }
.kpi-delta.down{ color: var(--accent-2); }

/* PANEL */
.panel{
  background: var(--panel); border:1px solid var(--line); border-radius:8px;
  padding: 20px 22px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(42,35,22,0.06);
}
.panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
.panel-title{ font-family: var(--font-display); font-weight:600; font-size:16px; text-transform:uppercase; letter-spacing:1px; }
.panel-hint{ font-size:11px; color:var(--mute); font-family: var(--font-mono); }

.toggle-group{ display:flex; gap:0; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
.toggle-btn{
  background: transparent; border:none; color:var(--mute); padding:6px 14px; font-size:12px;
  cursor:pointer; font-family: var(--font-mono); letter-spacing:0.5px; transition: all .15s;
}
.toggle-btn.active{ background: var(--accent); color: #fff; font-weight:600; }

/* CHART */
.chart-wrap{ position:relative; width:100%; }
svg.chart{ width:100%; height:340px; display:block; overflow:visible; }
.chart-col{ cursor:pointer; }
.chart-col:hover rect.bar-hit{ fill: rgba(217,113,26,0.07); }
.axis-label{ font-family: var(--font-mono); font-size:10px; fill: var(--mute); }
.grid-line{ stroke: var(--line); stroke-width:1; }
.month-selected rect.bar-hit{ fill: rgba(217,113,26,0.1); }
.tooltip{
  position:absolute; background: #fff; border:1px solid var(--accent);
  border-radius:6px; padding:10px 12px; font-size:12px; pointer-events:none; opacity:0;
  transition: opacity .1s; z-index:20; font-family: var(--font-mono); min-width:140px;
  box-shadow: 0 6px 20px rgba(42,35,22,0.18);
}
.tooltip .t-date{ color: var(--accent-2); font-weight:700; margin-bottom:4px; letter-spacing:0.5px; }
.tooltip .t-row{ display:flex; justify-content:space-between; gap:10px; color:var(--paper-dim); }

/* TABLES */
.table-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
@media (max-width: 880px){ .table-grid{ grid-template-columns: 1fr; } }
.tbl-scroll{ max-height: 420px; overflow-y:auto; border-radius:6px; border:1px solid var(--line); }
table{ width:100%; border-collapse: collapse; font-size:13px; }
thead th{
  position:sticky; top:0; background: var(--panel-2); text-align:left; padding:10px 12px;
  font-family: var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1px;
  color: var(--mute); border-bottom: 1px solid var(--line); z-index:2; cursor:pointer; user-select:none;
}
thead th:hover{ color: var(--accent-2); }
thead th.num, td.num{ text-align:right; }
tbody td{ padding:9px 12px; border-bottom: 1px solid rgba(227,217,194,0.7); color: var(--paper-dim); }
tbody tr:hover{ background: rgba(217,113,26,0.05); }
tbody tr:hover td{ color: var(--paper); }
.rank{ font-family: var(--font-mono); color: var(--mute); font-size:11px; width:24px; display:inline-block;}
.bar-mini{ height:4px; background: var(--line); border-radius:2px; margin-top:5px; overflow:hidden; }
.bar-mini-fill{ height:100%; background: var(--accent); }
.month-row{ cursor:pointer; }
.month-row.selected{ background: rgba(217,113,26,0.1); }
.month-row.selected td{ color: var(--accent-2); font-weight:600; }
.prod-name{ max-width:280px; }
.prod-name-text{ display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ANALYSIS */
.analysis-panel{
  background: linear-gradient(135deg, rgba(217,113,26,0.08), rgba(184,51,31,0.05));
  border:1px solid rgba(217,113,26,0.3);
}
.analysis-grid{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:24px; }
@media (max-width: 1100px){ .analysis-grid{ grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px){ .analysis-grid{ grid-template-columns: 1fr; } }
.analysis-block h4{
  font-family: var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
  color: var(--accent-2); margin-bottom:10px;
}
.analysis-block p{ font-size:13.5px; color: var(--paper-dim); margin-bottom:8px; }
.analysis-block p b{ color: var(--paper); font-weight:600; }
.insight-list{ list-style:none; }
.insight-list li{ font-size:13px; color: var(--paper-dim); padding:6px 0 6px 18px; position:relative; border-bottom:1px dashed rgba(227,217,194,0.9); }
.insight-list li:last-child{ border-bottom:none; }
.insight-list li::before{ content:'▸'; position:absolute; left:0; color: var(--accent-2); }
.insight-list li b{ color: var(--paper); }

.empty-state{ text-align:center; padding:40px 20px; color: var(--mute); font-family:var(--font-mono); font-size:12px; }

/* SECONDARY GRID: donut + map */
.secondary-grid{ display:grid; grid-template-columns: 1fr 1.4fr; gap:20px; margin-bottom:20px; }
@media (max-width: 880px){ .secondary-grid{ grid-template-columns: 1fr; } }

/* DONUT CHART */
.donut-wrap{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:center; }
.donut-svg-box{ position:relative; flex-shrink:0; }
.donut-center{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
}
.donut-center .dc-value{ font-family: var(--font-display); font-weight:700; font-size:20px; color: var(--paper); }
.donut-center .dc-label{ font-family: var(--font-mono); font-size:9.5px; color: var(--mute); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.donut-legend{ display:flex; flex-direction:column; gap:10px; min-width:160px; }
.donut-legend-item{ display:flex; align-items:center; gap:10px; cursor:default; }
.donut-swatch{ width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.donut-legend-text{ font-size:13px; }
.donut-legend-name{ font-weight:600; color: var(--paper); }
.donut-legend-stats{ font-family: var(--font-mono); font-size:11px; color: var(--mute); margin-top:1px; }
.donut-slice{ cursor:pointer; transition: opacity .15s; }
.donut-slice:hover{ opacity:0.82; }

/* MAP */
.map-svg-box{ width:100%; position:relative; }
.map-bubble{ cursor:pointer; transition: opacity .15s; }
.map-bubble:hover{ opacity:0.8; }
.map-tooltip{
  position:absolute; background:#fff; border:1px solid var(--accent);
  border-radius:6px; padding:9px 11px; font-size:12px; pointer-events:none; opacity:0;
  transition:opacity .1s; z-index:20; font-family: var(--font-mono); min-width:150px;
  box-shadow: 0 6px 20px rgba(42,35,22,0.18);
}
.map-tooltip .t-date{ color: var(--accent-2); font-weight:700; margin-bottom:4px; }
.map-tooltip .t-row{ display:flex; justify-content:space-between; gap:10px; color:var(--paper-dim); }
.map-note{ font-size:11px; color: var(--mute); font-family: var(--font-mono); margin-top:10px; text-align:center; }

footer{ text-align:center; color: var(--mute); font-size:11px; font-family: var(--font-mono); margin-top:30px; letter-spacing:0.5px; }

@media (max-width: 900px){
  .kpi-row{ grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 560px){
  .kpi-row{ grid-template-columns: 1fr 1fr; }
  .tag-title{ font-size:22px; }
  body{ padding: 18px 14px 40px; }
}
</style>

<script>
(function(){
  "use strict";

  var RAW = JSON.parse(document.getElementById('prtbl-data').textContent);

  var PROV_ROWS = RAW.provRows; // [dayOffset, provIdx(-1=unknown), qty, netto]

  var CHANNEL_COLORS = ['#b8331f', '#4f7d3f', '#2f6f8f', '#d9711a'];

  function offsetToDate(off){
    var d = new Date(BASE_DATE);
    d.setDate(d.getDate() + off);
    return d;
  }
  function dateToYM(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  function fmtIDR(n){
    n = Math.round(n);
    if (Math.abs(n) >= 1000000000) return 'Rp' + (n/1000000000).toFixed(2) + ' M';
    if (Math.abs(n) >= 1000000) return 'Rp' + (n/1000000).toFixed(1) + ' Jt';
    return 'Rp' + n.toLocaleString('id-ID');
  }
  function fmtIDRFull(n){
    return 'Rp' + Math.round(n).toLocaleString('id-ID');
  }
  function fmtNum(n){
    return Math.round(n).toLocaleString('id-ID');
  }
  var MONTH_NAMES = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
  var MONTH_NAMES_FULL = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  // Precompute date range
  var minOffset = Infinity, maxOffset = -Infinity;
  for (var i=0;i<ROWS.length;i++){
    if (ROWS[i][0] < minOffset) minOffset = ROWS[i][0];
    if (ROWS[i][0] > maxOffset) maxOffset = ROWS[i][0];
  }
  var minDate = offsetToDate(minOffset);
  var maxDate = offsetToDate(maxOffset);

  // ---------- STATE ----------
  var state = {

    dateTo: maxDate.toISOString().slice(0,10),
    product: 'ALL',
    selectedMonth: null, // 'YYYY-MM' or null
    metric: 'netto', // 'netto' | 'qty'
    monthSort: {key:'ym', dir:'asc'},
    prodSort: {key:'netto', dir:'desc'}
  };

  // ---------- DERIVED DATA ----------
  function getDateOffsetRange(){
    var from = new Date(state.dateFrom + 'T00:00:00');
    var to = new Date(state.dateTo + 'T00:00:00');
    return {
      fromOff: Math.floor((from - BASE_DATE) / 86400000),
      toOff: Math.floor((to - BASE_DATE) / 86400000)
    };
  }

  function getFilteredRows(){
    var range = getDateOffsetRange();
    var out = [];
    for (var i=0;i<ROWS.length;i++){
      var r = ROWS[i];
      if (r[0] < range.fromOff || r[0] > range.toOff) continue;
      if (state.product !== 'ALL' && PRODUCTS[r[1]] !== state.product) continue;
      out.push(r);
    }
    return out;
  }

  function getFilteredChannelRows(){
    var range = getDateOffsetRange();
    var out = [];
    for (var i=0;i<CHAN_ROWS.length;i++){
      var r = CHAN_ROWS[i];
      if (r[0] < range.fromOff || r[0] > range.toOff) continue;
      if (state.selectedMonth){
        var d = offsetToDate(r[0]);

      }
      out.push(r);
    }
    return out;
  }

  function getFilteredProvRows(){
    var range = getDateOffsetRange();

      out.push(r);
    }

  function buildChannelSummary(rows){
    var map = {};
    rows.forEach(function(r){
      var name = CHANNELS[r[1]];
      if (!map[name]) map[name] = {name:name, qty:0, netto:0};
      map[name].qty += r[2];
      map[name].netto += r[3];
    });
    return Object.values(map).sort(function(a,b){ return b.netto - a.netto; });
  }

  function buildProvinceSummary(rows){

      var name = idx === -1 ? 'Lainnya / Tidak Diketahui' : PROVINCES[idx];
      if (!map[name]) map[name] = {name:name, idx:idx, qty:0, netto:0};

      map[name].netto += r[3];
    });
    return Object.values(map).sort(function(a,b){ return b.netto - a.netto; });
  }

  function buildMonthly(rows){
    var map = {};
    rows.forEach(function(r){
      var d = offsetToDate(r[0]);
      var ym = dateToYM(d);
      if (!map[ym]) map[ym] = {ym: ym, qty:0, netto:0, bruto:0, orders:0};

      map[ym].netto += r[3];
      map[ym].bruto += r[4];
      map[ym].orders += r[5];
    });
    return Object.values(map).sort(function(a,b){ return a.ym < b.ym ? -1 : 1; });
  }

  function buildProductTable(rows){
    var map = {};

      map[name].netto += r[3];
      map[name].bruto += r[4];
      map[name].orders += r[5];
    });
    return Object.values(map);
  }

    var prevTo = new Date(from); prevTo.setDate(prevTo.getDate()-1);
    var prevFrom = new Date(prevTo); prevFrom.setDate(prevFrom.getDate() - spanDays + 1);
    var prevFromOff = Math.floor((prevFrom-BASE_DATE)/86400000);
    var prevToOff = Math.floor((prevTo-BASE_DATE)/86400000);
    var prevNetto=0, prevQty=0;
    ROWS.forEach(function(r){
      if (r[0]>=prevFromOff && r[0]<=prevToOff){
        if (state.product==='ALL' || PRODUCTS[r[1]]===state.product){
          prevNetto += r[3]; prevQty += r[2];
        }
      }
    });
    var nettoDelta = prevNetto>0 ? ((totalNetto-prevNetto)/prevNetto*100) : null;
    var qtyDelta = prevQty>0 ? ((totalQty-prevQty)/prevQty*100) : null;

    var channelRows = getFilteredChannelRows();
    var channelSummary = buildChannelSummary(channelRows);
    var provRows = getFilteredProvRows();
    var provinceSummary = buildProvinceSummary(provRows);

    app.innerHTML =
      renderHeader() +
      renderFilterBar() +
      renderKPIs(totalNetto, totalQty, totalOrders, avgOrder, nettoDelta, qtyDelta) +
      renderChartPanel(monthly) +
      renderTablesPanel(monthly, products) +
      renderSecondaryPanel(channelSummary, provinceSummary) +
      renderAnalysisPanel(monthly, products, totalNetto, totalQty, totalOrders, channelSummary, provinceSummary) +
      '<footer>PRTBL SALES INTELLIGENCE — DATA PERIODE ' + minDate.toLocaleDateString('id-ID') + ' &mdash; ' + maxDate.toLocaleDateString('id-ID') + '</footer>';

    attachEvents();
    drawChart(monthly);
    drawDonut(channelSummary);
    drawMap(provinceSummary);
  }

      '<div class="tag-left">' +

  function renderKPIs(totalNetto, totalQty, totalOrders, avgOrder, nettoDelta, qtyDelta){
    function deltaHtml(d){
      if (d===null) return '<div class="kpi-delta" style="color:var(--mute)">vs periode sebelumnya: n/a</div>';
      var cls = d>=0 ? 'up' : 'down';
      var sign = d>=0 ? '+' : '';
      return '<div class="kpi-delta '+cls+'">' + sign + d.toFixed(1) + '% vs periode sebelumnya</div>';
    }
    return '' +
    '<div class="kpi-row">' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Total Netto</div>' +
        '<div class="kpi-value">' + fmtIDR(totalNetto) + '</div>' +
        deltaHtml(nettoDelta) +
      '</div>' +
      '<div class="kpi-card alt">' +
        '<div class="kpi-label">Total Qty Terjual</div>' +
        '<div class="kpi-value">' + fmtNum(totalQty) + ' pcs</div>' +
        deltaHtml(qtyDelta) +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Jumlah Order</div>' +
        '<div class="kpi-value">' + fmtNum(totalOrders) + '</div>' +
        '<div class="kpi-delta" style="color:var(--mute)">total transaksi pada filter</div>' +
      '</div>' +
      '<div class="kpi-card alt">' +
        '<div class="kpi-label">Rata-rata / Order</div>' +
        '<div class="kpi-value">' + fmtIDR(avgOrder) + '</div>' +
        '<div class="kpi-delta" style="color:var(--mute)">netto per transaksi</div>' +
      '</div>' +
    '</div>';
  }

          '<div class="panel-title">Tren Penjualan Bulanan</div>' +
          '<div class="panel-hint">Klik bulan pada grafik untuk memfilter tabel &amp; analisis di bawah</div>' +

  function renderTablesPanel(monthly, products){
    // sort monthly
    var ms = state.monthSort;
    var monthlySorted = monthly.slice().sort(function(a,b){
      var av = ms.key==='ym' ? a.ym : a[ms.key];
      var bv = ms.key==='ym' ? b.ym : b[ms.key];
      if (av<bv) return ms.dir==='asc' ? -1 : 1;
      if (av>bv) return ms.dir==='asc' ? 1 : -1;
      return 0;
    });
    var ps = state.prodSort;
    var productsSorted = products.slice().sort(function(a,b){
      var av = ps.key==='name' ? a.name : a[ps.key];
      var bv = ps.key==='name' ? b.name : b[ps.key];
      if (av<bv) return ps.dir==='asc' ? -1 : 1;
      if (av>bv) return ps.dir==='asc' ? 1 : -1;
      return 0;
    });
    var maxNetto = products.length ? Math.max.apply(null, products.map(function(p){return p.netto;})) : 1;

    var monthRows = monthlySorted.map(function(m){
      var ymParts = m.ym.split('-');
      var label = MONTH_NAMES[parseInt(ymParts[1])-1] + ' ' + ymParts[0];
      var sel = state.selectedMonth === m.ym ? ' selected' : '';
      return '<tr class="month-row'+sel+'" data-ym="'+m.ym+'">' +
        '<td>' + label + '</td>' +
        '<td class="num">' + fmtNum(m.qty) + '</td>' +
        '<td class="num">' + fmtIDRFull(m.netto) + '</td>' +
        '<td class="num">' + fmtNum(m.orders) + '</td>' +
      '</tr>';
    }).join('');

    if (!monthRows) monthRows = '<tr><td colspan="4" class="empty-state">Tidak ada data pada filter ini</td></tr>';

    var prodRows = productsSorted.map(function(p, idx){
      var pct = maxNetto ? (p.netto/maxNetto*100) : 0;
      return '<tr>' +
        '<td><span class="rank">#'+(idx+1)+'</span></td>' +
        '<td class="prod-name"><span class="prod-name-text" title="'+escapeAttr(p.name)+'">'+escapeHtml(p.name)+'</span>' +
          '<div class="bar-mini"><div class="bar-mini-fill" style="width:'+pct.toFixed(1)+'%"></div></div>' +
        '</td>' +
        '<td class="num">' + fmtNum(p.qty) + '</td>' +
        '<td class="num">' + fmtIDRFull(p.netto) + '</td>' +
      '</tr>';
    }).join('');

    if (!prodRows) prodRows = '<tr><td colspan="4" class="empty-state">Tidak ada data pada filter ini</td></tr>';

    function arrow(key, current){
      if (current.key !== key) return '';
      return current.dir === 'asc' ? ' &#9650;' : ' &#9660;';
    }

    return '' +
    '<div class="table-grid">' +
      '<div class="panel">' +
        '<div class="panel-head">' +
          '<div class="panel-title">Penjualan per Bulan</div>' +
          '<div class="panel-hint">klik baris untuk filter chart</div>' +
        '</div>' +
        '<div class="tbl-scroll">' +
        '<table id="tbl-monthly">' +
          '<thead><tr>' +
            '<th data-sort="ym">Bulan'+arrow('ym',ms)+'</th>' +
            '<th class="num" data-sort="qty">Qty'+arrow('qty',ms)+'</th>' +
            '<th class="num" data-sort="netto">Netto'+arrow('netto',ms)+'</th>' +
            '<th class="num" data-sort="orders">Order'+arrow('orders',ms)+'</th>' +
          '</tr></thead>' +
          '<tbody>' + monthRows + '</tbody>' +
        '</table>' +
        '</div>' +
      '</div>' +
      '<div class="panel">' +
        '<div class="panel-head">' +
          '<div class="panel-title">Penjualan per Produk</div>' +
          '<div class="panel-hint">'+products.length+' produk &middot; urut netto terbesar</div>' +
        '</div>' +
        '<div class="tbl-scroll">' +
        '<table id="tbl-product">' +
          '<thead><tr>' +
            '<th>#</th>' +
            '<th data-sort="name">Produk'+arrow('name',ps)+'</th>' +
            '<th class="num" data-sort="qty">Qty'+arrow('qty',ps)+'</th>' +
            '<th class="num" data-sort="netto">Netto'+arrow('netto',ps)+'</th>' +
          '</tr></thead>' +
          '<tbody>' + prodRows + '</tbody>' +
        '</table>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderSecondaryPanel(channelSummary, provinceSummary){
    var totalChanNetto = channelSummary.reduce(function(s,c){return s+c.netto;},0);
    var legendHtml = channelSummary.map(function(c, i){
      var pct = totalChanNetto ? (c.netto/totalChanNetto*100) : 0;

      return '<div class="donut-legend-item">' +

    var totalAllProvNetto = provinceSummary.reduce(function(s,p){return s+p.netto;},0);
    var unknownPct = (unknownEntry && totalAllProvNetto) ? (unknownEntry.netto/totalAllProvNetto*100) : 0;
    var unknownNote = unknownEntry ? (' &middot; ' + unknownPct.toFixed(0) + '% data tanpa info lokasi') : '';

      '<div class="panel">' +

          '<div class="panel-hint">mengikuti rentang tanggal</div>' +
        '</div>' +
        '<div class="donut-wrap">' +
          '<div class="donut-svg-box" id="donut-box">' +
            '<svg id="donut-svg" width="180" height="180" viewBox="0 0 180 180"></svg>' +
            '<div class="donut-center" id="donut-center"></div>' +
          '</div>' +
          '<div class="donut-legend">' + legendHtml + '</div>' +

      '</div>' +
      '<div class="panel">' +
        '<div class="panel-head">' +
          '<div class="panel-title">Distribusi Penjualan per Provinsi</div>' +

      '</div>' +

  function renderAnalysisPanel(monthly, products, totalNetto, totalQty, totalOrders, channelSummary, provinceSummary){
    if (!monthly.length){
      return '<div class="panel analysis-panel"><div class="empty-state">Tidak ada data untuk dianalisis pada filter yang dipilih. Coba ubah rentang tanggal atau produk.</div></div>';
    }

    // Best & worst month
    var byNetto = monthly.slice().sort(function(a,b){return b.netto-a.netto;});
    var best = byNetto[0], worst = byNetto[byNetto.length-1];

    // trend: compare first half vs second half
    var n = monthly.length;
    var firstHalf = monthly.slice(0, Math.ceil(n/2));
    var secondHalf = monthly.slice(Math.ceil(n/2));
    var fhAvg = firstHalf.reduce(function(s,m){return s+m.netto;},0) / firstHalf.length;
    var shAvg = secondHalf.length ? secondHalf.reduce(function(s,m){return s+m.netto;},0) / secondHalf.length : fhAvg;
    var trendPct = fhAvg ? ((shAvg-fhAvg)/fhAvg*100) : 0;
    var trendWord = trendPct > 5 ? 'meningkat' : (trendPct < -5 ? 'menurun' : 'relatif stabil');

    // top products
    var byProdNetto = products.slice().sort(function(a,b){return b.netto-a.netto;});
    var top3 = byProdNetto.slice(0,3);
    var top3Share = totalNetto ? (top3.reduce(function(s,p){return s+p.netto;},0)/totalNetto*100) : 0;

    var avgMonthNetto = totalNetto / monthly.length;
    var ymParts = best.ym.split('-');
    var worstYmParts = worst.ym.split('-');

    var periodLabel = monthly.length === 1
      ? (MONTH_NAMES_FULL[parseInt(ymParts[1])-1] + ' ' + ymParts[0])
      : (monthly.length + ' bulan');

    var contextLine = state.product !== 'ALL'
      ? 'untuk produk <b>' + escapeHtml(truncate(state.product,50)) + '</b>'
      : 'untuk seluruh produk PRTBL';

    // channel + geo insight
    var totalChanNetto = channelSummary.reduce(function(s,c){return s+c.netto;},0);
    var topChannel = channelSummary[0];
    var topChannelPct = topChannel && totalChanNetto ? (topChannel.netto/totalChanNetto*100) : 0;
    var knownProvSummary = provinceSummary.filter(function(p){ return p.idx !== -1; });
    var topProv = knownProvSummary[0];
    var totalProvNetto = knownProvSummary.reduce(function(s,p){return s+p.netto;},0);
    var topProvPct = topProv && totalProvNetto ? (topProv.netto/totalProvNetto*100) : 0;
    var top3Prov = knownProvSummary.slice(0,3);
    var top3ProvShare = totalProvNetto ? (top3Prov.reduce(function(s,p){return s+p.netto;},0)/totalProvNetto*100) : 0;

    return '' +
    '<div class="panel analysis-panel">' +
      '<div class="panel-head"><div class="panel-title">Analisis Singkat</div><div class="panel-hint">otomatis dari data terfilter</div></div>' +
      '<div class="analysis-grid">' +
        '<div class="analysis-block">' +
          '<h4>Ringkasan Periode</h4>' +
          '<p>Pada periode <b>' + periodLabel + '</b> ' + contextLine + ', tercatat <b>' + fmtNum(totalOrders) + ' order</b> dengan total qty <b>' + fmtNum(totalQty) + ' pcs</b> dan total netto <b>' + fmtIDRFull(totalNetto) + '</b>.</p>' +
          '<p>Rata-rata perolehan netto per bulan adalah <b>' + fmtIDRFull(avgMonthNetto) + '</b>. Performa terbaik tercatat pada <b>' + MONTH_NAMES_FULL[parseInt(ymParts[1])-1] + ' ' + ymParts[0] + '</b> dengan netto <b>' + fmtIDRFull(best.netto) + '</b>, sementara bulan terlemah adalah <b>' + MONTH_NAMES_FULL[parseInt(worstYmParts[1])-1] + ' ' + worstYmParts[0] + '</b> dengan netto <b>' + fmtIDRFull(worst.netto) + '</b>.</p>' +
          '<p>Secara tren, penjualan paruh awal vs paruh akhir periode ini <b>' + trendWord + '</b> (' + (trendPct>=0?'+':'') + trendPct.toFixed(1) + '%).</p>' +
        '</div>' +
        '<div class="analysis-block">' +
          '<h4>Sorotan Produk</h4>' +
          '<ul class="insight-list">' +
            top3.map(function(p,i){
              var share = totalNetto ? (p.netto/totalNetto*100) : 0;
              return '<li><b>#' + (i+1) + ' ' + escapeHtml(truncate(p.name,45)) + '</b> &mdash; ' + fmtIDRFull(p.netto) + ' (' + share.toFixed(1) + '% dari total, ' + fmtNum(p.qty) + ' pcs)</li>';
            }).join('') +
          '</ul>' +
          '<p style="margin-top:10px;">3 produk teratas berkontribusi <b>' + top3Share.toFixed(1) + '%</b> dari total netto pada periode/filter ini &mdash; ' + (top3Share > 50 ? 'menunjukkan penjualan cukup terkonsentrasi pada beberapa SKU unggulan.' : 'menunjukkan penjualan tersebar cukup merata di banyak produk.') + '</p>' +
        '</div>' +
        '<div class="analysis-block">' +
          '<h4>Channel &amp; Wilayah</h4>' +
          (topChannel ? '<p>Channel <b>' + escapeHtml(topChannel.name) + '</b> mendominasi dengan <b>' + topChannelPct.toFixed(1) + '%</b> dari total netto pada rentang tanggal ini.</p>' : '<p>Belum ada data channel.</p>') +
          (topProv ? '<p>Provinsi dengan penjualan tertinggi adalah <b>' + escapeHtml(topProv.name) + '</b> (' + topProvPct.toFixed(1) + '% dari netto bergeotag), dengan 3 provinsi teratas menyumbang <b>' + top3ProvShare.toFixed(1) + '%</b>.</p>' : '<p>Belum ada data wilayah.</p>') +
          '<p style="font-size:12px; color:var(--mute);">*Data channel &amp; wilayah mengikuti filter tanggal, belum mengikuti filter produk spesifik.</p>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ---------- CHART DRAW ----------
  function drawChart(monthly){
    var svg = document.getElementById('chart-svg');
    if (!svg) return;
    var W = 1180, H = 340;
    var padL = 70, padR = 20, padT = 20, padB = 40;
    var plotW = W - padL - padR;
    var plotH = H - padT - padB;

    if (!monthly.length){
      svg.innerHTML = '<text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="var(--mute)" font-family="var(--font-mono)" font-size="13">Tidak ada data</text>';
      return;
    }

    var metric = state.metric;
    var values = monthly.map(function(m){ return m[metric]; });
    var maxVal = Math.max.apply(null, values) * 1.15 || 1;

    var n = monthly.length;
    var stepX = n > 1 ? plotW / (n-1) : 0;
    var bandW = n > 1 ? Math.min(plotW/n, 70) : plotW;

    function xFor(i){ return n>1 ? padL + i*stepX : padL + plotW/2; }
    function yFor(v){ return padT + plotH - (v/maxVal*plotH); }

    // grid lines (5 horizontal)
    var gridLines = '';
    var gridLabels = '';
    var steps = 4;
    for (var g=0; g<=steps; g++){
      var val = maxVal * g/steps;
      var y = padT + plotH - (val/maxVal*plotH);
      gridLines += '<line class="grid-line" x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'"/>';
      var label = metric==='netto' ? fmtIDR(val) : fmtNum(val);
      gridLabels += '<text class="axis-label" x="'+(padL-10)+'" y="'+(y+3)+'" text-anchor="end">'+label+'</text>';
    }

    // area path
    var linePoints = monthly.map(function(m,i){ return xFor(i) + ',' + yFor(m[metric]); });
    var areaPath = 'M' + padL + ',' + (padT+plotH) + ' L' + linePoints.join(' L') + ' L' + (xFor(n-1)) + ',' + (padT+plotH) + ' Z';
    var linePath = 'M' + linePoints.join(' L');

    var gradientId = 'areaGrad';
    var defs = '<defs><linearGradient id="'+gradientId+'" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="var(--accent)" stop-opacity="0.45"/>' +
      '<stop offset="100%" stop-color="var(--accent)" stop-opacity="0.02"/>' +
      '</linearGradient></defs>';

    // x labels + click columns
    var cols = '';
    var xLabels = '';
    monthly.forEach(function(m, i){
      var x = xFor(i);
      var ymParts = m.ym.split('-');
      var label = MONTH_NAMES[parseInt(ymParts[1])-1] + " '" + ymParts[0].slice(2);
      var isSelected = state.selectedMonth === m.ym;
      var halfBand = (n>1 ? stepX : plotW) / 2;
      cols += '<g class="chart-col '+(isSelected?'month-selected':'')+'" data-ym="'+m.ym+'" data-idx="'+i+'">' +
        '<rect class="bar-hit" x="'+(x-halfBand)+'" y="'+padT+'" width="'+(halfBand*2)+'" height="'+plotH+'" fill="transparent"/>' +
        '<circle cx="'+x+'" cy="'+yFor(m[metric])+'" r="4" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>' +
        (isSelected ? '<line x1="'+x+'" y1="'+padT+'" x2="'+x+'" y2="'+(padT+plotH)+'" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,3"/>' : '') +
      '</g>';
      xLabels += '<text class="axis-label" x="'+x+'" y="'+(H-padB+18)+'" text-anchor="middle">'+label+'</text>';
    });

    svg.innerHTML = defs + gridLines + gridLabels +
      '<path d="'+areaPath+'" fill="url(#'+gradientId+')"/>' +
      '<path d="'+linePath+'" fill="none" stroke="var(--accent)" stroke-width="2.5"/>' +
      cols + xLabels;

    // tooltip events
    var tooltip = document.getElementById('chart-tooltip');
    var chartWrap = svg.parentElement;
    Array.prototype.forEach.call(svg.querySelectorAll('.chart-col'), function(col){
      col.addEventListener('mousemove', function(e){
        var idx = parseInt(col.getAttribute('data-idx'));
        var m = monthly[idx];
        var ymParts = m.ym.split('-');
        tooltip.innerHTML = '<div class="t-date">' + MONTH_NAMES_FULL[parseInt(ymParts[1])-1] + ' ' + ymParts[0] + '</div>' +
          '<div class="t-row"><span>Qty</span><span>'+fmtNum(m.qty)+' pcs</span></div>' +
          '<div class="t-row"><span>Netto</span><span>'+fmtIDRFull(m.netto)+'</span></div>' +
          '<div class="t-row"><span>Order</span><span>'+fmtNum(m.orders)+'</span></div>';
        var rect = chartWrap.getBoundingClientRect();
        var tx = e.clientX - rect.left + 14;
        var ty = e.clientY - rect.top - 10;
        if (tx + 160 > rect.width) tx = e.clientX - rect.left - 174;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
        tooltip.style.opacity = '1';
      });
      col.addEventListener('mouseleave', function(){ tooltip.style.opacity = '0'; });
      col.addEventListener('click', function(){
        var ym = col.getAttribute('data-ym');
        state.selectedMonth = (state.selectedMonth === ym) ? null : ym;
        render();
      });
    });
  }

  // ---------- DONUT CHART DRAW ----------
  function drawDonut(channelSummary){
    var svg = document.getElementById('donut-svg');
    var center = document.getElementById('donut-center');
    if (!svg) return;

    var total = channelSummary.reduce(function(s,c){return s+c.netto;},0);
    var cx = 90, cy = 90, rOuter = 78, rInner = 48;

    if (!total || !channelSummary.length){
      svg.innerHTML = '<circle cx="'+cx+'" cy="'+cy+'" r="'+rOuter+'" fill="none" stroke="var(--line)" stroke-width="'+(rOuter-rInner)+'"/>';
      center.innerHTML = '<div class="dc-value">&ndash;</div><div class="dc-label">Tidak ada data</div>';
      return;
    }

    var startAngle = -90; // start at top
    var paths = '';
    channelSummary.forEach(function(c){
      var frac = c.netto / total;
      var angle = frac * 360;
      var endAngle = startAngle + angle;
      var color = CHANNEL_COLORS[CHANNELS.indexOf(c.name) % CHANNEL_COLORS.length];
      paths += donutSlicePath(cx, cy, rOuter, rInner, startAngle, endAngle, color, c.name, c.netto, c.qty, frac);
      startAngle = endAngle;
    });

    svg.innerHTML = paths;
    center.innerHTML = '<div class="dc-value">' + fmtIDR(total) + '</div><div class="dc-label">Total Netto</div>';

    // tooltip events on slices
    var tooltip = document.getElementById('chart-tooltip'); // reuse? no, need separate - create one inline
    var box = document.getElementById('donut-box');
    var existingTip = box.querySelector('.tooltip');
    if (!existingTip){
      existingTip = document.createElement('div');
      existingTip.className = 'tooltip';
      existingTip.style.position = 'absolute';
      box.appendChild(existingTip);
    }
    Array.prototype.forEach.call(svg.querySelectorAll('.donut-slice'), function(slice){
      slice.addEventListener('mousemove', function(e){
        var name = slice.getAttribute('data-name');
        var netto = parseFloat(slice.getAttribute('data-netto'));
        var qty = parseFloat(slice.getAttribute('data-qty'));
        var pct = parseFloat(slice.getAttribute('data-pct'))*100;
        existingTip.innerHTML = '<div class="t-date">' + escapeHtml(name) + '</div>' +
          '<div class="t-row"><span>Netto</span><span>'+fmtIDRFull(netto)+'</span></div>' +
          '<div class="t-row"><span>Qty</span><span>'+fmtNum(qty)+' pcs</span></div>' +
          '<div class="t-row"><span>Share</span><span>'+pct.toFixed(1)+'%</span></div>';
        var rect = box.getBoundingClientRect();
        var tx = e.clientX - rect.left + 12;
        var ty = e.clientY - rect.top - 10;
        existingTip.style.left = tx + 'px';
        existingTip.style.top = ty + 'px';
        existingTip.style.opacity = '1';
      });
      slice.addEventListener('mouseleave', function(){ existingTip.style.opacity = '0'; });
    });
  }

  function polarToXY(cx, cy, r, angleDeg){
    var rad = angleDeg * Math.PI / 180;
    return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)];
  }

  function donutSlicePath(cx, cy, rOuter, rInner, startAngle, endAngle, color, name, netto, qty, frac){
    // handle full circle case (single channel = 100%)
    if (endAngle - startAngle >= 359.99){
      endAngle = startAngle + 359.99;
    }
    var p1 = polarToXY(cx, cy, rOuter, startAngle);
    var p2 = polarToXY(cx, cy, rOuter, endAngle);
    var p3 = polarToXY(cx, cy, rInner, endAngle);
    var p4 = polarToXY(cx, cy, rInner, startAngle);
    var largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
    var d = 'M ' + p1[0] + ' ' + p1[1] +
      ' A ' + rOuter + ' ' + rOuter + ' 0 ' + largeArc + ' 1 ' + p2[0] + ' ' + p2[1] +
      ' L ' + p3[0] + ' ' + p3[1] +
      ' A ' + rInner + ' ' + rInner + ' 0 ' + largeArc + ' 0 ' + p4[0] + ' ' + p4[1] +
      ' Z';
    return '<path class="donut-slice" d="'+d+'" fill="'+color+'" stroke="#fff" stroke-width="2" ' +
      'data-name="'+escapeAttr(name)+'" data-netto="'+netto+'" data-qty="'+qty+'" data-pct="'+frac+'"/>';
  }

  // ---------- MAP DRAW ----------
  function drawMap(provinceSummary){
    var svg = document.getElementById('map-svg');
    if (!svg) return;
    var W = 1180, H = 460;

    var known = provinceSummary.filter(function(p){ return p.idx !== -1 && p.idx !== undefined; });

    if (!known.length){
      svg.innerHTML = '<text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="var(--mute)" font-family="var(--font-mono)" font-size="13">Tidak ada data wilayah</text>';
      return;
    }

    // Indonesia bounding box approx: lat -11 to 6, lng 95 to 141
    var latMin=-11, latMax=6.5, lngMin=94.5, lngMax=141.5;
    var padX=20, padY=20;
    function project(lat, lng){
      var x = padX + (lng-lngMin)/(lngMax-lngMin) * (W-2*padX);
      var y = padY + (latMax-lat)/(latMax-latMin) * (H-2*padY);
      return [x,y];
    }

    var maxNetto = Math.max.apply(null, known.map(function(p){return p.netto;}));
    var minR = 5, maxR = 34;

    // simple background landmass hint: draw faint archipelago guide lines (not actual map, abstract)
    var bg = '<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="var(--panel-2)" rx="8"/>';

    // graticule lines for subtle geographic reference
    var grid = '';
    for (var lng=95; lng<=140; lng+=15){
      var p1 = project(latMin, lng), p2 = project(latMax, lng);
      grid += '<line x1="'+p1[0]+'" y1="'+p1[1]+'" x2="'+p2[0]+'" y2="'+p2[1]+'" stroke="var(--line)" stroke-width="1" stroke-dasharray="2,4"/>';
    }
    for (var lat=-10; lat<=5; lat+=5){
      var p1b = project(lat, lngMin), p2b = project(lat, lngMax);
      grid += '<line x1="'+p1b[0]+'" y1="'+p1b[1]+'" x2="'+p2b[0]+'" y2="'+p2b[1]+'" stroke="var(--line)" stroke-width="1" stroke-dasharray="2,4"/>';
    }

    var bubbles = '';
    var labels = '';
    known.forEach(function(p, i){
      var coords = PROV_COORDS[p.idx];
      if (!coords) return;
      var xy = project(coords[0], coords[1]);
      var r = minR + Math.sqrt(p.netto/maxNetto) * (maxR-minR);
      var isTop = i < 5;
      bubbles += '<circle class="map-bubble" cx="'+xy[0]+'" cy="'+xy[1]+'" r="'+r+'" ' +
        'fill="var(--accent)" fill-opacity="0.55" stroke="var(--accent-2)" stroke-width="1.5" ' +
        'data-name="'+escapeAttr(p.name)+'" data-netto="'+p.netto+'" data-qty="'+p.qty+'"/>';
      if (isTop){
        labels += '<text x="'+xy[0]+'" y="'+(xy[1]-r-6)+'" text-anchor="middle" class="axis-label" font-size="10.5" font-weight="600" fill="var(--paper-dim)">'+escapeHtml(truncate(p.name,16))+'</text>';
      }
    });

    svg.innerHTML = bg + grid + bubbles + labels;

    var tooltip = document.getElementById('map-tooltip');
    var box = svg.parentElement;
    Array.prototype.forEach.call(svg.querySelectorAll('.map-bubble'), function(bubble){
      bubble.addEventListener('mousemove', function(e){
        var name = bubble.getAttribute('data-name');
        var netto = parseFloat(bubble.getAttribute('data-netto'));
        var qty = parseFloat(bubble.getAttribute('data-qty'));
        tooltip.innerHTML = '<div class="t-date">' + escapeHtml(name) + '</div>' +
          '<div class="t-row"><span>Netto</span><span>'+fmtIDRFull(netto)+'</span></div>' +
          '<div class="t-row"><span>Qty</span><span>'+fmtNum(qty)+' pcs</span></div>';
        var rect = box.getBoundingClientRect();
        var tx = e.clientX - rect.left + 12;
        var ty = e.clientY - rect.top - 10;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
        tooltip.style.opacity = '1';
      });
      bubble.addEventListener('mouseleave', function(){ tooltip.style.opacity = '0'; });
    });
  }

  // ---------- EVENTS ----------
  function attachEvents(){
    var fFrom = document.getElementById('f-from');
    var fTo = document.getElementById('f-to');
    var fProd = document.getElementById('f-product');
    var btnReset = document.getElementById('btn-reset');

    if (fFrom) fFrom.addEventListener('change', function(){ state.dateFrom = this.value; state.selectedMonth=null; render(); });
    if (fTo) fTo.addEventListener('change', function(){ state.dateTo = this.value; state.selectedMonth=null; render(); });
    if (fProd) fProd.addEventListener('change', function(){ state.product = this.value; render(); });
    if (btnReset) btnReset.addEventListener('click', function(){
      state.dateFrom = minDate.toISOString().slice(0,10);
      state.dateTo = maxDate.toISOString().slice(0,10);
      state.product = 'ALL';
      state.selectedMonth = null;
      render();
    });

    Array.prototype.forEach.call(document.querySelectorAll('[data-action="clear-product"]'), function(el){
      el.addEventListener('click', function(){ state.product='ALL'; render(); });
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-action="clear-month"]'), function(el){
      el.addEventListener('click', function(){ state.selectedMonth=null; render(); });
    });

    Array.prototype.forEach.call(document.querySelectorAll('.toggle-btn'), function(btn){
      if (btn.getAttribute('data-metric') === state.metric) btn.classList.add('active');
      btn.addEventListener('click', function(){
        state.metric = this.getAttribute('data-metric');
        render();
      });
    });

    Array.prototype.forEach.call(document.querySelectorAll('.month-row'), function(row){
      row.addEventListener('click', function(){
        var ym = this.getAttribute('data-ym');
        state.selectedMonth = (state.selectedMonth === ym) ? null : ym;
        render();
      });
    });

    Array.prototype.forEach.call(document.querySelectorAll('#tbl-monthly th[data-sort]'), function(th){
      th.addEventListener('click', function(){
        var key = this.getAttribute('data-sort');
        if (state.monthSort.key === key) state.monthSort.dir = state.monthSort.dir==='asc'?'desc':'asc';
        else { state.monthSort.key = key; state.monthSort.dir = 'asc'; }
        render();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll('#tbl-product th[data-sort]'), function(th){
      th.addEventListener('click', function(){
        var key = this.getAttribute('data-sort');
        if (state.prodSort.key === key) state.prodSort.dir = state.prodSort.dir==='asc'?'desc':'asc';
        else { state.prodSort.key = key; state.prodSort.dir = (key==='name'?'asc':'desc'); }
        render();
      });
    });
  }

  // ---------- UTILS ----------
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function escapeAttr(s){ return escapeHtml(s); }
  function truncate(s, n){ return s.length > n ? s.slice(0,n-1) + '…' : s; }

  // apply selected month as date filter override for tables/analysis (but keep chart showing full range)
  var _origGetFiltered = getFilteredRows;
  getFilteredRows = function(){
    var rows = _origGetFiltered();
    if (state.selectedMonth){
      rows = rows.filter(function(r){
        var d = offsetToDate(r[0]);
        return dateToYM(d) === state.selectedMonth;
      });
    }
    return rows;
  };

  render();
})();
</script>
